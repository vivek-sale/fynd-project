<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Latest compiled and minified CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
    <title>Home</title>
</head>
<body>
    <div class="topnav" id="myTopnav">
        <a href="#home" class="active">Home</a> 
        <!-- <a href="#myModal" data-bs-toggle="modal" data-bs-target="#myModalNew">New Subject</a>
        <a href="/admin/students">Students</a> -->
        <a href="/docs">Docs</a>
        <a href="/changepassword">Change Password</a>
        <a href="/logout">Logout</a>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
        <i class="fa fa-bars"></i>
        </a>
  </div>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="d-flex justify-content-between align-items-center">
                <h1>{{teacher.fullname}}     {{teacher.id}}</h1>
            </div>
        </div>
        <div class="row">
            <div class="d-flex justify-content-between align-items-center">
                <h3>Subjects</h3>
            </div>
        </div>
    {% if subjects != None %}
        {% for subject in subjects %}
                <div>
                    <div class="card">
                    <div class="card-body d-flex flex-row justify-content-between align-items-center">
                        <div class="details">
                            <div class="footer d-flex flex-row justify-content-between align-items-center">
                                <h4>{{subject.subjectname}}</h4></a>
                                <h5>{{subject.subjectid}}</h5>           
                                
                            </div>
                            <div class="footer d-flex flex-row justify-content-between align-items-center">
                                <button type="button" class="btn btn-primary mb-2" onclick="window.location.href='/teacher/{{subject.subjectid}}';">MARK</button>
                            </div>
                        </div>
                    </div>
                    </div>
                </div>
        {% endfor %}
    {% else %}
    <h2>No Subjects Present Currently</h2>
    {% endif %}
    
    </div>
    

</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="{{ url_for('static', path='/script.js') }}"></script>
<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>
</html>
